services:
  postgres:
    image: postgres:16-alpine
    container_name: payment-postgres
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME:-payment_user}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-payment_password}
      POSTGRES_DB: ${DATABASE_NAME:-payment_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-payment_user} -d ${DATABASE_NAME:-payment_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: node:20-alpine
    container_name: payment-backend
    working_dir: /workspace/backend
    volumes:
      - ./:/workspace
    env_file:
      - ./backend/.env
    environment:
      DATABASE_HOST: postgres
      NODE_ENV: development
    command: sh -c "npm install && npm run start:dev"
    ports:
      - "3002:3002"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://localhost:3002/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    container_name: payment-frontend
    working_dir: /workspace/frontend
    volumes:
      - ./:/workspace
    environment:
      DOCKERIZED: "true"
      VITE_API_PROXY_TARGET: http://backend:3002
    command: sh -c "npm install && export DOCKERIZED=true && export VITE_API_PROXY_TARGET=http://backend:3002 && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
